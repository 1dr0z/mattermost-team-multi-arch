name: release-version

on:
  workflow_call:
    inputs:
      version: { type: string, required: true }
  workflow_dispatch:
    inputs:
      version: { type: string, required: false }

env:
  REGISTRY: ghcr.io
  SERVER_IMAGE: ${{ github.repository_owner }}/mattermost-team
  MMCTL_IMAGE: ${{ github.repository_owner }}/mattermost-mmctl
  VERSION: ${{ inputs.version }}

jobs:
  release-version:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v5
      - uses: extractions/setup-just@v4
      - uses: docker/setup-qemu-action@v4

      - env:
          REGISTRY_USER: ${{ github.actor }}
          REGISTRY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: just login

      - run: just patch "$VERSION"
      - run: just build "$VERSION" amd64
      - run: just build "$VERSION" arm64

      - run: just assemble "$VERSION"
      - run: just verify-manifests "$VERSION"
      - run: just publish-manifests "$VERSION"

      - env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          dir=$(just _build-dir $VERSION)
          gh release create "v${VERSION}" $dir/Containerfile \
            --target "$GITHUB_SHA" \
            --title "mattermost $VERSION" \
            --latest=false
