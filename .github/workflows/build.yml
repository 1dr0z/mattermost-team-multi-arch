name: build

on:
  schedule:
    - cron: "0 6 * * *" # daily check
  workflow_dispatch:
    inputs:
      version:
        description: "Force-build a specific version (e.g. 11.7.2)."
        required: false
        type: string

concurrency:
  group: build
  cancel-in-progress: false

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  TEAM_IMAGE: mattermost-team
  MMCTL_IMAGE: mattermost-mmctl
  MM_EDITION: team

jobs:
  plan:
    runs-on: ubuntu-24.04
    outputs:
      versions: ${{ steps.plan.outputs.versions }}
      owner: ${{ steps.owner.outputs.owner }}
    steps:
      - id: owner
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - id: plan
        env:
          OWNER: ${{ steps.owner.outputs.owner }}
          FORCE_VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail
          semver='^[0-9]+\.[0-9]+\.[0-9]+$'

          # Manual seed/override: build exactly the requested version.
          if [[ -n "${FORCE_VERSION}" ]]; then
            echo "versions=$(jq -cn --arg v "$FORCE_VERSION" '[$v]')" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          team_repo="docker://${REGISTRY}/${OWNER}/${TEAM_IMAGE}"
          mmctl_repo="docker://${REGISTRY}/${OWNER}/${MMCTL_IMAGE}"

          # Upstream stable tags.
          upstream=$(git ls-remote --tags --refs https://github.com/mattermost/mattermost.git \
            | awk '{print $2}' | sed 's|refs/tags/v||' | grep -E "$semver" | sort -V)

          # Tags already published (empty if the image doesn't exist yet).
          team_tags=$(skopeo list-tags "$team_repo" 2>/dev/null | jq -r '.Tags[]' | grep -E "$semver" | sort -V || true)
          mmctl_tags=$(skopeo list-tags "$mmctl_repo" 2>/dev/null | jq -r '.Tags[]' | grep -E "$semver" | sort -V || true)

          # Floor = lowest published version. No floor yet => seed manually, do nothing now.
          floor=$(printf '%s\n' "$team_tags" | head -n1)
          if [[ -z "$floor" ]]; then
            echo "Registry empty; seed once with workflow_dispatch (version=X.Y.Z)."
            echo "versions=[]" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Upstream tags at or above the floor.
          floor_re=$(printf '%s' "$floor" | sed 's/[.]/\\./g')
          at_or_above=$(printf '%s\n%s\n' "$upstream" "$floor" | sort -V -u | sed -n "/^${floor_re}\$/,\$p")

          # A version is "built" only if BOTH images have it.
          built=$(comm -12 <(printf '%s\n' "$team_tags" | sort) <(printf '%s\n' "$mmctl_tags" | sort))

          # Missing = (upstream >= floor) - built.
          missing=$(comm -23 <(printf '%s\n' "$at_or_above" | sort) <(printf '%s\n' "$built" | sort) | grep -E "$semver" || true)

          if [[ -z "$missing" ]]; then
            versions='[]'
          else
            versions=$(printf '%s\n' "$missing" | jq -R . | jq -cs 'sort')
          fi
          echo "versions=${versions}" >> "$GITHUB_OUTPUT"
          echo "Planning to build: ${versions}"

  build:
    needs: plan
    if: needs.plan.outputs.versions != '[]'
    permissions:
      packages: write
    strategy:
      fail-fast: false
      matrix:
        version: ${{ fromJson(needs.plan.outputs.versions) }}
        target:
          - { runner: ubuntu-24.04, arch: amd64 }
          - { runner: ubuntu-24.04-arm, arch: arm64 }
    runs-on: ${{ matrix.target.runner }}
    env:
      OWNER: ${{ needs.plan.outputs.owner }}
      VERSION: ${{ matrix.version }}
      ARCH: ${{ matrix.target.arch }}
    steps:
      - uses: actions/checkout@v4

      - name: Ensure podman
        run: command -v podman >/dev/null || { sudo apt-get update && sudo apt-get install -y podman; }

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login "$REGISTRY" -u '${{ github.actor }}' --password-stdin

      - name: Fetch upstream Dockerfile and apply patch
        run: |
          set -euo pipefail
          curl -fsSL "https://raw.githubusercontent.com/mattermost/mattermost/refs/tags/v${VERSION}/server/build/Dockerfile" \
            -o mattermost/Containerfile.upstream
          patch --fuzz 0 -o mattermost/Containerfile.patched \
            mattermost/Containerfile.upstream < mattermost/multi-arch.patch

      - name: Build and push mattermost-team
        run: |
          set -euo pipefail
          team="${REGISTRY}/${OWNER}/${TEAM_IMAGE}"
          pkg="https://releases.mattermost.com/${VERSION}/mattermost-${MM_EDITION}-${VERSION}-linux-${ARCH}.tar.gz"
          podman build \
            --platform "linux/${ARCH}" \
            --format docker \
            --build-arg MM_PACKAGE="$pkg" \
            --tag "localhost/mattermost-team" \
            --tag "${team}:${VERSION}-${ARCH}" \
            --file mattermost/Containerfile.patched \
            mattermost
          podman push "${team}:${VERSION}-${ARCH}"

      - name: Build and push mattermost-mmctl
        run: |
          set -euo pipefail
          mmctl="${REGISTRY}/${OWNER}/${MMCTL_IMAGE}"
          podman build \
            --platform "linux/${ARCH}" \
            --format docker \
            --tag "${mmctl}:${VERSION}-${ARCH}" \
            --file mmctl/Containerfile \
            mmctl
          podman push "${mmctl}:${VERSION}-${ARCH}"

  merge:
    needs: [plan, build]
    if: needs.plan.outputs.versions != '[]'
    permissions:
      packages: write
    strategy:
      fail-fast: false
      matrix:
        version: ${{ fromJson(needs.plan.outputs.versions) }}
    runs-on: ubuntu-24.04
    env:
      OWNER: ${{ needs.plan.outputs.owner }}
      VERSION: ${{ matrix.version }}
    steps:
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login "$REGISTRY" -u '${{ github.actor }}' --password-stdin

      - name: Assemble multi-arch manifests
        run: |
          set -euo pipefail
          for image in "$TEAM_IMAGE" "$MMCTL_IMAGE"; do
            repo="${REGISTRY}/${OWNER}/${image}"
            podman manifest create "${repo}:${VERSION}"
            podman manifest add "${repo}:${VERSION}" "docker://${repo}:${VERSION}-amd64"
            podman manifest add "${repo}:${VERSION}" "docker://${repo}:${VERSION}-arm64"
            podman manifest push --all "${repo}:${VERSION}" "docker://${repo}:${VERSION}"
          done

  commit:
    needs: [plan, merge]
    if: needs.plan.outputs.versions != '[]'
    permissions:
      contents: write
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Commit and tag rendered Containerfiles
        env:
          VERSIONS: ${{ needs.plan.outputs.versions }}
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          for v in $(echo "$VERSIONS" | jq -r '.[]' | sort -V); do
            curl -fsSL "https://raw.githubusercontent.com/mattermost/mattermost/refs/tags/v${v}/server/build/Dockerfile" \
              -o mattermost/Containerfile.upstream
            patch --fuzz 0 -o mattermost/Containerfile.patched \
              mattermost/Containerfile.upstream < mattermost/multi-arch.patch
            git add mattermost/Containerfile.upstream mattermost/Containerfile.patched
            git commit -m "mattermost ${v}"
            git tag -a "v${v}" -m "mattermost ${v}"
          done
          git push --follow-tags origin "HEAD:${{ github.event.repository.default_branch }}"
