name: build

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      version:
        type: string
        description: "Force-build a specific version."
        required: false

concurrency:
  group: build
  cancel-in-progress: false

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  SERVER_IMAGE: ${{ github.repository_owner }}/mattermost-team
  MMCTL_IMAGE: ${{ github.repository_owner }}/mattermost-mmctl

jobs:
  plan:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: read
    outputs:
      versions: ${{ steps.plan-versions.outputs.versions }}
    steps:
      - uses: actions/checkout@v5
      - uses: extractions/setup-just@v4
      - id: plan-versions
        env:
          FORCE_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [[ -n "$FORCE_VERSION" ]]; then
            versions=$(jq -cn --arg v "$FORCE_VERSION" '[$v]')
          else
            versions=$(just missing-versions | jq -R . | jq -cs .)
          fi
          echo "versions=$versions" >> "$GITHUB_OUTPUT"

  version:
    needs: plan
    if: needs.plan.outputs.versions != '[]'
    permissions:
      contents: write
      packages: write
    strategy:
      fail-fast: false
      matrix:
        version: ${{ fromJson(needs.plan.outputs.versions) }}
    uses: ./.github/workflows/release-version.yml
    with:
      version: ${{ matrix.version }}
    secrets: inherit
